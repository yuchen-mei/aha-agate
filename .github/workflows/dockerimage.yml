name: Docker Image CI

# Publish a "latest" image *but only on successful PR merge.*
# And also every week at midnight between Sat/Sun because tradition I guess.

on:
  pull_request:
    types:
      - closed
  schedule:
    # Sunday morning, eleven minutes after midnight?
    - cron: '0 11 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_on_pr_merge:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Set image metadata
      run: |
        image="ghcr.io/${GITHUB_REPOSITORY}"
        echo "IMAGE_NAME=${image,,}" >> "$GITHUB_ENV"
        echo "AHA_HOME=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

    - name: Delete clockwork and halide metadata
      run: |
        du -shx     .git/modules/clockwork .git/modules/Halide-to-Hardware || true
        /bin/rm -rf .git/modules/clockwork .git/modules/Halide-to-Hardware

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and Publish Docker Image
      env:
        GTOKEN: ${{ secrets.VOYAGER_GITHUB_TOKEN || github.token }}
      run: |
        docker buildx build \
          --build-arg AHA_HOME="$AHA_HOME" \
          --secret id=gtoken,env=GTOKEN \
          --tag "$IMAGE_NAME:latest" \
          --tag "$IMAGE_NAME:${GITHUB_SHA}" \
          --push .
